name: Delete Multidev on Merge

on:
  pull_request:
    types: [closed]

jobs:
  delete-multidev:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Terminus
        uses: pantheon-systems/terminus-github-actions@v1
        env:
          TERMINUS_ALLOW_UNSUPPORTED_NEWER_PHP: 1
        with:
          terminus-version: '3.2.0'
          pantheon-machine-token: ${{ secrets.TERMINUS_TOKEN }}
      - name: Install Terminus Secrets Plugin
        env:
          TERMINUS_ALLOW_UNSUPPORTED_NEWER_PHP: 1
        run: terminus self:plugin:install pantheon-systems/terminus-secrets-plugin --yes

      - name: Resolve Multidev environment name
        id: resolve_env
        env:
          PR_TITLE: "${{ github.event.pull_request.title }}"
          PR_BODY: "${{ github.event.pull_request.body }}"
          BRANCH: "${{ github.event.pull_request.head.ref || github.head_ref || github.ref_name }}"
          PR_NUMBER: "${{ github.event.pull_request.number }}"
        run: |
          issue_key=""
          if [[ "${PR_TITLE:-}" =~ ([A-Z]{1,10}-[0-9]+) ]]; then
            issue_key="${BASH_REMATCH[0]}"
          elif [[ "${PR_BODY:-}" =~ ([A-Z]{1,10}-[0-9]+) ]]; then
            issue_key="${BASH_REMATCH[0]}"
          elif [[ "${BRANCH:-}" =~ ([A-Z]{1,10}-[0-9]+) ]]; then
            issue_key="${BASH_REMATCH[0]}"
          fi

          if [[ -n "$issue_key" ]]; then
            TERMINUS_ENV="$(echo "$issue_key" | tr '[:upper:]' '[:lower:]' | cut -c -11)"
          else
            TERMINUS_ENV="pr-${PR_NUMBER}"
            TERMINUS_ENV="$(echo "$TERMINUS_ENV" | tr '[:upper:]' '[:lower:]' | cut -c -11)"
          fi

          echo "Resolved multidev env name: ${TERMINUS_ENV}"
          echo "terminus_env=${TERMINUS_ENV}" >> "$GITHUB_OUTPUT"

      - name: Delete Multidev Environment
        env:
          TERMINUS_ALLOW_UNSUPPORTED_NEWER_PHP: 1
          PANTHEON_SITE: "${{ vars.PANTHEON_SITE }}"
          TERMINUS_ENV: "${{ steps.resolve_env.outputs.terminus_env }}"
        run: |
          if [[ -z "${PANTHEON_SITE:-}" ]]; then
            echo "Missing required repository variable: PANTHEON_SITE"
            exit 1
          fi

          # Check if the multidev environment exists
          if terminus env:list "${PANTHEON_SITE}" --field=id | grep -qw "${TERMINUS_ENV}"; then
            echo "Multidev environment '${TERMINUS_ENV}' found for site '${PANTHEON_SITE}'. Deleting..."
            terminus env:delete "${PANTHEON_SITE}.${TERMINUS_ENV}" --delete-branch --yes --force
            echo "Deletion command executed for multidev '${TERMINUS_ENV}'."
          else
            echo "No multidev environment named '${TERMINUS_ENV}' found for site '${PANTHEON_SITE}'. Nothing to delete."
          fi

      - name: Post cleanup comment
        uses: actions/github-script@v6
        if: always()
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const hasExistingComment = comments.some(comment => 
              comment.user.login === 'github-actions[bot]' && 
              comment.body.includes('Multidev environment cleanup')
            );
            
            if (!hasExistingComment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: 'Multidev environment cleanup completed.'
              });
            }
