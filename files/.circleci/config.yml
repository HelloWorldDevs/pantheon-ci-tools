version: 2.1

orbs:
  jira: circleci/jira@2.2.0
  gh: circleci/github-cli@2.7.0
  slack: circleci/slack@5.1.1

executors:
  pantheon:
    docker:
    - image: quay.io/pantheon-public/build-tools-ci:8.x-php8.3
    working_directory: ~/project

  playwright:
    docker:
    - image: mcr.microsoft.com/playwright:v1.52.0-noble
    working_directory: ~/project

  # Behat executor: a Drupal/PHP testing image PLUS a MariaDB service container.
  # The second image is what makes `dockerize -wait tcp://localhost:3306` work —
  # it's the database listening on localhost:3306. The default `pantheon`
  # executor is a single image with NO db service, which is why dockerize there
  # hangs the full timeout and fails. The testing image ships dockerize, apache,
  # drush, composer and headless chrome for functional Behat runs.
  behat:
    docker:
    - image: helloworlddevs/atdove-testing-image:v1
    - image: cimg/mariadb:10.6
      environment:
        MYSQL_ROOT_HOST: "%"
        MYSQL_ROOT_PASSWORD: root
        MYSQL_DATABASE: drupal
        MYSQL_PASSWORD: root
        MYSQL_USER: user
        DRUPAL_DB_HOST: 127.0.0.1
    working_directory: /var/www/project
    environment:
      TZ: "/usr/share/zoneinfo/America/Los_Angeles"
      ADMIN_USERNAME: admin

defaults: &defaults
  executor: pantheon
  working_directory: ~/project
  environment:
    TZ: "/usr/share/zoneinfo/America/Los_Angeles"
    NOTIFY: 'scripts/github/add-commit-comment {project} {sha} "Created multidev environment [{site}#{env}]({site-url}). Login with creds: username: admin, password: wh0C4r3s?" {site-url}'
    ADMIN_USERNAME: admin

jobs:
  # [job] Pre-flight guard: abort the pipeline early if Pantheon's multidev
  # cap is reached, instead of failing deep inside the deploy after a full
  # build. No-ops on the default branch (deploys to dev) and when no
  # ticket/PR maps to a multidev. Tunables: MAX_MULTIDEVS, DEFAULT_BRANCH.
  check_multidev_capacity:
    <<: *defaults
    resource_class: small
    steps:
    - checkout
    - run:
        name: Abort if Pantheon multidev capacity is reached
        command: |
          chmod +x ./.ci/scripts/check-multidev-capacity.sh
          ./.ci/scripts/check-multidev-capacity.sh

  # Main build and deploy job
  build_and_deploy:
    <<: *defaults
    resource_class: small
    steps:
    # [setup] Checkout code and set up Docker
    - checkout
    - setup_remote_docker:
        docker_layer_caching: true
    # [vars][wet] Calculate environment URLs and variables
    - run:
        name: Setup environment and calculate URLs
        command: |
          # Run Pantheon environment setup
          /build-tools-ci/scripts/set-environment

          # Source the script to preserve environment variables
          source ./.ci/scripts/setup_vars.sh

          # Verify the variables were set correctly
          echo "Verification: Using TERMINUS_ENV: $TERMINUS_ENV"
          echo "Verification: Using MULTIDEV_SITE_URL: $MULTIDEV_SITE_URL"
          echo "Verification: Using DEV_SITE_URL: $DEV_SITE_URL"

          # Create the workspace directory if it doesn't exist
          mkdir -p /tmp/workspace

          # Write all variables to a single file for workspace and subsequent steps
          {
            # CircleCI variables
            echo "export CI_BUILD_URL='${CIRCLE_BUILD_URL}'"
            echo "export CI_NODE_INDEX='${CIRCLE_NODE_INDEX}'"
            echo "export CI_REPOSITORY_URL='${CIRCLE_REPOSITORY_URL}'"
            echo "export ARTIFACTS_DIR_URL='${CIRCLE_BUILD_URL}/artifacts/${CIRCLE_NODE_INDEX}/artifacts'"

            # Pantheon and site variables
            echo "export TERMINUS_SITE='$TERMINUS_SITE'"
            echo "export TERMINUS_ENV='$TERMINUS_ENV'"
            echo "export JIRA_TICKET_ID='$JIRA_TICKET_ID'"
            echo "export MULTIDEV_SITE_URL='$MULTIDEV_SITE_URL'"
            echo "export DEV_SITE_URL='$DEV_SITE_URL'"

            # Web-root + corrected theme path (computed by setup_vars.sh).
            # Exporting both means every later step (Load env, Verify,
            # Install, Build, Pantheon push, visual-regression job, etc.)
            # gets the same canonical values without re-detecting.
            echo "export WEB_ROOT='$WEB_ROOT'"
            echo "export THEME_PATH='$THEME_PATH'"
          } > /tmp/workspace/env_vars.sh

          # Also add to BASH_ENV for current job steps
          cat /tmp/workspace/env_vars.sh >> $BASH_ENV
          source $BASH_ENV

          echo "Saved environment variables to workspace:"
          cat /tmp/workspace/env_vars.sh
    # [build] Handle Composer dependencies
    - run:
        name: Clear Composer Cache
        command: |
          if [ -f "composer.json" ]; then
            composer clear-cache
          fi
    - run:
        name: Installing composer dependencies
        command: |
          if [ -f "composer.json" ]; then
            composer install --no-ansi --no-interaction --optimize-autoloader --no-progress
          else
            echo "No composer.json found, skipping composer install."
          fi
    # [cache] Save Composer cache
    - save_cache:
        key: composer-cache-v1-{{ checksum "composer.lock" }}
        paths:
        - $HOME/.composer/cache

    # Load environment variables from external file
    - run:
        name: Load environment variables
        command: |
          # Make the env vars script executable
          chmod +x ./.circleci/env_vars.sh
          # Source it into BASH_ENV for all steps
          echo 'source ./.circleci/env_vars.sh' >> $BASH_ENV
          # Re-run web-root detection AFTER env_vars.sh on every step. The
          # project's env_vars.sh may unconditionally `export THEME_PATH=...`
          # which would otherwise overwrite the corrected value from
          # setup_vars.sh. detect_web_root.sh is idempotent.
          echo 'source ./.ci/scripts/detect_web_root.sh' >> $BASH_ENV
          source $BASH_ENV

    # Verify required environment variables are set.
    # THEME_PATH normalization runs automatically via $BASH_ENV (see
    # setup_vars.sh + detect_web_root.sh); this step only sanity-checks the
    # final values and hard-fails before we try to `cd` into something
    # that doesn't exist.
    - run:
        name: Verify required theme variables are set
        command: |
          echo "WEB_ROOT=${WEB_ROOT:-<unset>}"
          echo "THEME_PATH=${THEME_PATH:-<unset>}"

          if [ -z "${THEME_PATH:-}" ]; then
            echo "ERROR: THEME_PATH environment variable is not set!"
            echo "Please set THEME_PATH in the CircleCI project settings or in .circleci/env_vars.sh"
            exit 1
          fi

          if [ ! -d "${THEME_PATH}" ]; then
            echo "ERROR: THEME_PATH does not exist on disk: ${THEME_PATH}"
            echo "Detected WEB_ROOT: ${WEB_ROOT:-<none>}"
            echo "Project layout (top-level):"
            ls -1 | sed 's/^/  /'
            exit 1
          fi

          if [ -z "${THEME_BUILD}" ]; then
            echo "ERROR: THEME_BUILD environment variable is not set!"
            echo "Please set THEME_BUILD in the CircleCI project settings or in .circleci/env_vars.sh"
            exit 1
          fi

          # Catch the common copy-paste bug where THEME_BUILD is set to
          # `npm install` (or duplicates THEME_INSTALL). The build "succeeds"
          # but produces no compiled assets, and the deploy ships an unstyled
          # site. Fail loudly here so the misconfiguration is obvious.
          if [ "${THEME_BUILD}" = "${THEME_INSTALL}" ] || \
             printf '%s' "${THEME_BUILD}" | grep -qE '^[[:space:]]*npm[[:space:]]+install([[:space:]]|$)'; then
            echo "ERROR: THEME_BUILD looks wrong — it's '${THEME_BUILD}'."
            echo "  THEME_BUILD should compile the theme (e.g. 'npm run build', 'gulp build')."
            echo "  THEME_INSTALL is what installs dependencies (e.g. 'npm install')."
            echo "  Fix THEME_BUILD in .circleci/env_vars.sh."
            exit 1
          fi

          # Validate every `npm run <script>` referenced anywhere in
          # THEME_BUILD actually exists in the theme's package.json. Catches
          # typos AND missing scripts in chained commands like
          # `npm ci && npm run build`. Scans the whole string, not just the
          # leading command, so a typo at the end still fails the build.
          if [ -f "${THEME_PATH}/package.json" ]; then
            npm_scripts="$(printf '%s' "${THEME_BUILD}" | grep -oE 'npm[[:space:]]+run[[:space:]]+[A-Za-z0-9_:.-]+' | awk '{print $NF}' | sort -u || true)"
            for s in ${npm_scripts}; do
              if ! grep -qE "\"${s}\"[[:space:]]*:" "${THEME_PATH}/package.json"; then
                echo "ERROR: THEME_BUILD references 'npm run ${s}' but no '${s}' script is defined in ${THEME_PATH}/package.json"
                echo "Available scripts:"
                grep -E '^\s+"[^"]+"\s*:\s*".*"' "${THEME_PATH}/package.json" | sed 's/^/  /' || true
                exit 1
              fi
            done
          fi

          echo "Required theme variables verified: THEME_PATH=${THEME_PATH}, THEME_INSTALL=${THEME_INSTALL}, THEME_BUILD=${THEME_BUILD}"

    # Use npm ci instead of npm install if you want to install dependencies
    # according to the exact versions in package-lock.json.
    # NOTE: THEME_INSTALL/THEME_BUILD are invoked via `bash -c` so shell
    # operators inside the value (e.g. `npm ci && npm run build`) are
    # parsed as operators, not passed as literal args. With bare
    # `${THEME_INSTALL}` expansion they'd word-split and npm would silently
    # receive `&&` as a positional argument and skip everything after it.
    - run:
        name: Installing NPM dependencies in theme
        command: |
          cd "${THEME_PATH}"
          bash -c "${THEME_INSTALL}"

    # Your existing steps for building assets
    - run:
        name: Compiling SCSS to CSS, minifying JS
        command: |
          cd "${THEME_PATH}"
          bash -c "${THEME_BUILD}"

    # Diagnostic: prove the build produced files before we try to ship them.
    # If styles ever go missing from a deploy, this output is the first
    # place to look — empty/missing artifacts here mean the build dropped
    # them; full output here but missing on prod means the deploy step
    # excluded them (see `git status` diagnostics below).
    - run:
        name: Theme build sanity check (post-build artifacts)
        command: |
          echo "Top-level contents of ${THEME_PATH}:"
          ls -la "${THEME_PATH}" | sed 's/^/  /'
          # Buffer find results to a file + truncate via awk to avoid
          # SIGPIPE/141 with high-volume output under `set -eo pipefail`.
          for d in dist build assets css js public; do
            if [ -d "${THEME_PATH}/${d}" ]; then
              echo
              echo "${THEME_PATH}/${d} ($(du -sh "${THEME_PATH}/${d}" | cut -f1)):"
              FIND_TMP="$(mktemp)"
              find "${THEME_PATH}/${d}" -maxdepth 3 -type f \( -name '*.css' -o -name '*.js' -o -name '*.map' \) > "${FIND_TMP}" 2>/dev/null || true
              awk 'NR<=40 {print "  " $0} END {if (NR>40) print "  ... (" NR-40 " more)"}' "${FIND_TMP}"
              rm -f "${FIND_TMP}"
            fi
          done

    # NOTE: don't hardcode a web-root path (e.g. web/themes/) here — projects
    # vary (web/ vs html/, per composer drupal-scaffold web-root). Built theme
    # assets are deployed to Pantheon via build:env:push, and the visual-
    # regression job tests the live multidev URL, so it doesn't need the theme
    # source in the workspace. Persist only what later jobs actually consume.
    - persist_to_workspace:
        root: .
        paths:
        - test_routes.json
    - run:
        name: Remove .gitignore files from theme directories
        command: |
          # Find and remove all .gitignore files in theme subdirectories
          if [ -n "${THEME_PATH}" ] && [ -d "${THEME_PATH}" ]; then
            echo "Removing .gitignore files from theme directory: ${THEME_PATH}"
            find ${THEME_PATH} -type f -name ".gitignore" -exec rm -f {} \;
            echo "Removed all .gitignore files from theme directories"
          else
            echo "Theme path not found or not defined. Skipping .gitignore removal."
          fi
    - run:
        name: Capture PR-changed config (before build rewrites git)
        environment:
          CONFIG_BASE_BRANCH: main
          CONFIG_SYNC_DIR: config/sync
          PR_CHANGED_FILE: /tmp/pr-changed-config.txt
          PR_BASE_DIR: /tmp/pr-base-config
        command: |
          # Snapshot which config/sync files the PR changed while the
          # checkout is still pristine. The later "Sync Drupal config from
          # prod" step reads this list — by then build:env:push has rewritten
          # git, so the diff can't be recomputed reliably.
          chmod +x ./.ci/scripts/config_split/capture-pr-config-changes.sh
          ./.ci/scripts/config_split/capture-pr-config-changes.sh
    - run:
        name: Preparing code for Pantheon
        command: |
          # Cutting root .gitignore so composer dependencies can be committed
          sed -i '1,/^# :::::::::::::::::::::: cut ::::::::::::::::::::::$/d' .gitignore

          # Diagnostic: surface any .gitignore rules that would still exclude
          # built theme assets. If files under THEME_PATH are listed here,
          # they WILL be missing from the Pantheon push — fix the matching
          # ignore rule (typically a `dist/`, `build/`, or `assets/` pattern
          # in a parent .gitignore that our theme-dir cleanup didn't touch).
          # Buffer to a file (no pipes!) so SIGPIPE from `head` can't kill
          # the build under `set -eo pipefail`.
          if [ -n "${THEME_PATH:-}" ] && [ -d "${THEME_PATH}" ]; then
            echo "Checking for .gitignore exclusions under ${THEME_PATH}..."
            IGNORED_TMP="$(mktemp)"
            git ls-files --others --ignored --exclude-standard "${THEME_PATH}" > "${IGNORED_TMP}" 2>/dev/null || true
            if [ -s "${IGNORED_TMP}" ]; then
              echo "⚠️  These built theme files are still .gitignore'd and WILL NOT deploy:"
              awk 'NR<=40 {print "    " $0} END {if (NR>40) print "    ... (" NR-40 " more)"}' "${IGNORED_TMP}"
              echo "    (Look for a parent-directory .gitignore with dist/, build/, or assets/ rules.)"
            else
              echo "  No .gitignore'd files under ${THEME_PATH}."
            fi
            rm -f "${IGNORED_TMP}"
          fi

          # Strip nested .git dirs BEFORE staging. Composer "source" installs
          # (dev/@dev branch packages like drupal/pdf:^1.0@dev) are git-cloned
          # rather than dist-unzipped, and some library installs (e.g.
          # web/libraries/dropzone) ship their own .git too. If they're still
          # present at `git add -A`, git records each as a gitlink (embedded
          # repo) instead of committing its files — so the package's code never
          # reaches the Pantheon artifact, and `drush config:import` later
          # fails with "Unable to install the <module> module since it does not
          # exist". -mindepth 2 protects the project's own top-level .git.
          echo "Stripping nested .git directories before staging..."
          NESTED_GIT="$(find . -mindepth 2 -name .git -prune 2>/dev/null || true)"
          if [ -n "${NESTED_GIT}" ]; then
            echo "${NESTED_GIT}" | sed 's/^/  removing: /'
            find . -mindepth 2 -name .git -prune -exec rm -rf {} + 2>/dev/null || true
          else
            echo "  none found."
          fi

          git add -A

          # Diagnostic: show what's about to be deployed so missing files
          # are obvious in the CI log without having to ssh to Pantheon.
          # Buffer to a file + truncate via awk (NOT `head`) to avoid the
          # SIGPIPE/141 trap with high-volume output under `pipefail`.
          STATUS_TMP="$(mktemp)"
          git status --short > "${STATUS_TMP}" 2>/dev/null || true
          STATUS_COUNT=$(wc -l < "${STATUS_TMP}" | tr -d ' ')
          echo "Files staged for deploy commit (${STATUS_COUNT} total, showing up to 80):"
          awk 'NR<=80 {print "  " $0} END {if (NR>80) print "  ... (" NR-80 " more)"}' "${STATUS_TMP}"
          rm -f "${STATUS_TMP}"

          git commit -m "Preparing code for deployment" || true
    - run:
        name: Deploying to Pantheon
        command: ./.ci/scripts/dev-multidev.sh
        no_output_timeout: 40m
    - run:
        name: Sync Drupal config from prod (preserving PR-modified files)
        no_output_timeout: 40m
        environment:
          CONFIG_BASE_BRANCH: main
          CONFIG_SYNC_DIR: config/sync
          CONFIG_SYNC_REPORT: /tmp/config-sync-report.md
          PR_CHANGED_FILE: /tmp/pr-changed-config.txt
          PR_BASE_DIR: /tmp/pr-base-config
        command: |
          chmod +x ./.ci/scripts/config_split/sync-prod-config.sh
          ./.ci/scripts/config_split/sync-prod-config.sh
    - run:
        name: Post config-sync report to PR (mirrored to Jira)
        when: always
        environment:
          CONFIG_SYNC_REPORT: /tmp/config-sync-report.md
        command: |
          chmod +x ./.ci/scripts/config_split/post_config_sync_comment.sh
          ./.ci/scripts/config_split/post_config_sync_comment.sh
    - run:
        name: Post config-sync report directly to Jira
        when: always
        environment:
          CONFIG_SYNC_REPORT: /tmp/config-sync-report.md
        command: |
          # Posts to Jira REST API directly so prod config drift lands on
          # the ticket even when no PR is associated, or when the
          # GitHub→Jira mirror workflow isn't installed. Requires
          # JIRA_BASE_URL / JIRA_USER / JIRA_TOKEN in a CircleCI context;
          # the script no-ops cleanly if any are missing.
          chmod +x ./.ci/scripts/config_split/post_config_sync_jira_comment.sh
          ./.ci/scripts/config_split/post_config_sync_jira_comment.sh
    - run:
        name: Post Multidev URL to GitHub PR
        command: ./.ci/scripts/post_multidev_url.sh

    # Save environment variables and Git data for the test job
    - run:
        name: Prepare workspace
        command: |
          mkdir -p /tmp/workspace

          # Copy the entire working directory to the workspace
          # This includes the .git directory which is needed for Jira integration
          echo "Copying files to workspace..."
          cp -a . /tmp/workspace/

          # Make sure the .git directory exists
          if [ -d "/tmp/workspace/.git" ]; then
            echo "Git repository found in workspace"
            # Ensure Git is properly configured in the workspace
            cd /tmp/workspace
            git config --global --add safe.directory /tmp/workspace
            git config --global user.email "circleci@example.com"
            git config --global user.name "CircleCI"
          else
            echo "Warning: .git directory not found in workspace"
          fi

          # Save environment variables
          {
            echo "export TERMINUS_SITE='${TERMINUS_SITE}'"
            echo "export TERMINUS_ENV='${TERMINUS_ENV}'"
            echo "export MULTIDEV_SITE_URL='${MULTIDEV_SITE_URL}'"
            echo "export DEV_SITE_URL='${DEV_SITE_URL}'"
          } > /tmp/workspace/env_vars.sh

          # Carry the COMPILED theme assets to the Behat jobs. Those jobs do a
          # fresh checkout + composer install and do NOT build the theme, so the
          # gitignored built CSS/JS (dist/, css/, js/) produced above is absent
          # there and the site renders unstyled — which breaks Behat steps that
          # rely on CSS-driven visibility. Stage the theme dir (minus
          # node_modules) and record its project-relative path so Behat can
          # restore it to the same location (THEME_PATH isn't recomputed there).
          # Always create the targets so persist_to_workspace never errors on a
          # missing path, even when THEME_PATH is unset.
          mkdir -p /tmp/workspace/theme-build
          : > /tmp/workspace/theme-path.txt
          if [ -n "${THEME_PATH:-}" ] && [ -d "${THEME_PATH}" ]; then
            THEME_REL="${THEME_PATH#./}"
            printf '%s\n' "${THEME_REL}" > /tmp/workspace/theme-path.txt
            mkdir -p "/tmp/workspace/theme-build/${THEME_REL}"
            tar -C "${THEME_PATH}" --exclude=node_modules -cf - . \
              | tar -C "/tmp/workspace/theme-build/${THEME_REL}" -xf -
            echo "Staged compiled theme assets for Behat: ${THEME_REL}"
          else
            echo "THEME_PATH unset or missing — no theme assets staged for Behat."
          fi

          # Debug: Show what we're saving
          echo "=== Workspace Contents ==="
          ls -la /tmp/workspace
          echo "\n=== Saved Environment Variables ==="
          cat /tmp/workspace/env_vars.sh
          echo "=================================="

    - persist_to_workspace:
        root: /tmp/workspace
        paths:
        - env_vars.sh
        - .ci/
        - .circleci/
        - .git/
        - test_routes.json
        # Compiled theme assets + their project-relative path, consumed by the
        # Behat jobs (which don't build the theme themselves).
        - theme-build/
        - theme-path.txt

  # Playwright visual regression testing job
  playwright_visual_tests:
    executor: playwright
    resource_class: medium
    working_directory: /tmp/workspace
    environment:
      ARTIFACTS_FULL_DIR: /tmp/workspace/artifacts
    steps:
    # [persist][vars] Attach workspace to load saved environment variables and code
    - attach_workspace:
        at: /tmp/workspace
    # [setup] Set up Docker for running visual tests
    - setup_remote_docker:
        docker_layer_caching: true
    # [setup][notify] Install jq for Jira notifications
    - run:
        name: Install jq
        command: apt-get update && apt-get install -y jq
    # [vars] Load environment variables from the workspace
    - run:
        name: Load environment variables
        command: |
          # Source the environment variables file
          if [ -f /tmp/workspace/env_vars.sh ]; then
            echo "Loading environment variables from workspace..."
            source /tmp/workspace/env_vars.sh
            # Add to BASH_ENV for subsequent steps
            cat /tmp/workspace/env_vars.sh >> $BASH_ENV
            source $BASH_ENV

            # Debug: Show key environment variables
            echo "DEV_SITE_URL: $DEV_SITE_URL"
            echo "MULTIDEV_SITE_URL: $MULTIDEV_SITE_URL"
          else
            echo "Warning: Environment variables file not found"
          fi

    # [guard] Wait for the multidev to wake before hitting it. Pantheon
    # appservers cold-start in 30–60s; without this the first screenshots
    # race the spin-up and flake. Runs first so the wait is explicit.
    - run:
        name: Check multidev is ready
        command: |
          chmod +x ./.ci/scripts/check-multidev.sh
          ./.ci/scripts/check-multidev.sh

    # [test] Run visual regression tests with Playwright
    - run:
        name: Run Playwright visual regression tests
        command: |
          echo "Current directory: $(pwd)"
          echo "Listing contents of /tmp/workspace/.ci/test/visual-regression:"
          ls -la /tmp/workspace/.ci/test/visual-regression
          cd /tmp/workspace/.ci/test/visual-regression
          echo "Installing npm dependencies..."
          # Use npm ci for cleaner and faster installs in CI
          npm ci
          echo "Installing Playwright browsers..."
          # The base image should have system dependencies, so playwright install should suffice
          # If issues persist, can switch to 'npx playwright install --with-deps'
          npx playwright install
          echo "Running Playwright tests..."
          chmod +x ./run-playwright
          ./run-playwright

    # [artifacts] Store screenshots with visual comparison reports
    - store_artifacts:
        path: /tmp/workspace/.ci/test/visual-regression/playwright-report

    # [artifacts] Store JUnit test results
    - store_test_results:
        path: /tmp/workspace/.ci/test/visual-regression/test-results

    # [notify] Notify Slack on failure
    - slack/notify:
        event: fail
        channel: C06G970M5PF
        template: basic_fail_1
    # [notify][jira] Send notification to Jira
    - jira/notify:
        environment: testing
        job_type: deployment
        debug: true
        pipeline_id: << pipeline.id >>
        pipeline_number: << pipeline.number >>
  # Behat functional tests — SETUP phase (runs once).
  #
  # Builds the project, installs Drupal into the MariaDB service container,
  # then exports the installed DB as a gzip dump persisted to the workspace.
  # The parallel `behat_test` containers import that dump instead of each
  # re-installing Drupal from scratch — turning an N×(slow install) cost into
  # 1×install + N×(fast import).
  #
  # Like every test job here it self-skips via `circleci-agent step halt` when
  # the project ships no tests/behat directory, so the tool adapts to projects
  # with or without Behat coverage with no config changes.
  behat_setup:
    executor: behat
    resource_class: small
    steps:
    - checkout
    # [gate] Skip the whole job unless the project ships Behat tests. Runs
    # first so a Behat-less project never pays for the DB install/export.
    - run:
        name: Skip if project has no tests/behat
        command: |
          if [ ! -d tests/behat ]; then
            echo "No tests/behat directory in this project — skipping Behat setup."
            circleci-agent step halt
          fi
    - run:
        name: Start XVFB
        command: |
          export DISPLAY=:99.0
          Xvfb :99 -screen 0 1280x1024x16 &
    - run:
        name: Setting PHP vars
        command: |
          echo 'memory_limit = -1' | sudo tee -a /usr/local/etc/php/conf.d/docker-php-memlimit.ini
          echo 'memory_limit = -1' | sudo tee -a /usr/local/etc/php/conf.d/memory.ini
          echo "display_errors = On" | sudo tee /usr/local/etc/php/conf.d/display_errors.ini
          echo "display_startup_errors = On" | sudo tee -a /usr/local/etc/php/conf.d/display_errors.ini
          echo "error_reporting = E_ALL" | sudo tee -a /usr/local/etc/php/conf.d/display_errors.ini
    # Behat runs against a LOCAL Drupal install (its own DB), independent of the
    # Pantheon deploy — so we build vendor/ here rather than relying on a
    # persisted build artifact (this pipeline's build_and_deploy doesn't ship
    # one). Project-specific asset builds (gulp/npm) should live in configure-site.
    - run:
        name: Composer install
        command: |
          if [ -f composer.json ]; then
            composer install --no-ansi --no-interaction --optimize-autoloader --no-progress
          else
            echo "No composer.json found, skipping composer install."
          fi
    # Pull the compiled theme assets staged by build_and_deploy. Cheap: the
    # workspace only carries the built CSS/JS (node_modules excluded), not the
    # whole tree. On the PR flow build_and_deploy runs first so this restores;
    # on the master flow Behat runs BEFORE the build, so the workspace is empty
    # here and the fallback build step below compiles the theme instead.
    - attach_workspace:
        at: /tmp/workspace
    - run:
        name: Restore compiled theme assets from build
        command: |
          set -eo pipefail
          if [ ! -s /tmp/workspace/theme-path.txt ]; then
            echo "No staged theme path — skipping (will try a local build next)."
            exit 0
          fi
          THEME_REL="$(cat /tmp/workspace/theme-path.txt)"
          SRC="/tmp/workspace/theme-build/${THEME_REL}"
          if [ -n "${THEME_REL}" ] && [ -d "${SRC}" ]; then
            echo "Restoring compiled theme assets to ${THEME_REL}"
            mkdir -p "${THEME_REL}"
            # Overlay built assets onto the checked-out theme source.
            cp -a "${SRC}/." "${THEME_REL}/"
            # Flag downstream so the fallback build doesn't rebuild needlessly.
            echo 'export THEME_RESTORED=1' >> "$BASH_ENV"
          else
            echo "No staged theme assets at ${SRC} — will try a local build next."
          fi
    # Fallback theme build for when assets weren't carried from build_and_deploy
    # (the master flow runs Behat first). Best-effort and NON-FATAL: it must
    # never break the deploy gate, so every failure path just warns and the site
    # may render unstyled. Picks up THEME_* from the project's env_vars.sh and/or
    # CircleCI project env, then normalizes the web root.
    - run:
        name: Build theme locally if not carried from build
        command: |
          if [ "${THEME_RESTORED:-0}" = "1" ]; then
            echo "Theme assets already restored from build — skipping local build."
            exit 0
          fi
          [ -f ./.circleci/env_vars.sh ] && source ./.circleci/env_vars.sh || true
          [ -f ./.ci/scripts/detect_web_root.sh ] && source ./.ci/scripts/detect_web_root.sh || true
          if [ -z "${THEME_PATH:-}" ] || [ ! -d "${THEME_PATH}" ]; then
            echo "No usable THEME_PATH — skipping theme build (site may be unstyled)."
            exit 0
          fi
          if ! command -v npm >/dev/null 2>&1; then
            echo "npm not available in this image — skipping theme build (site may be unstyled)."
            exit 0
          fi
          echo "Building theme at ${THEME_PATH}"
          ( cd "${THEME_PATH}" \
              && bash -c "${THEME_INSTALL:-npm ci}" \
              && bash -c "${THEME_BUILD:-npm run build}" ) \
            || echo "Theme build failed — continuing (site may be unstyled)."
    - run:
        name: Configuring Drupal
        command: ./.ci/test/behat/configure-site
    - run:
        name: Create DB
        command: |
          dockerize -wait tcp://localhost:3306 -timeout 4m
          mysql -h 127.0.0.1 -P 3306 -u root -proot -e "CREATE DATABASE circle_test;"
    - run:
        name: Installing Drupal and importing config
        command: ./.ci/test/behat/install-drupal
        no_output_timeout: 30m
    - run:
        name: Disable Hubspot module
        command: ./vendor/bin/drush pm:uninstall hubspot -y || echo "Hubspot not enabled"
    - run:
        name: Clear Drupal Cache
        command: ./vendor/bin/drush cr
    - run:
        name: Export database for parallel jobs
        command: |
          mkdir -p ./tmp/behat-db-export
          ./vendor/bin/drush sql-dump --gzip > ./tmp/behat-db-export/drupal-installed.sql.gz
          echo "Database exported to ./tmp/behat-db-export/drupal-installed.sql.gz"
          ls -lh ./tmp/behat-db-export/
    # Persist the built tree (vendor/, config, etc.) AND the DB dump so the
    # parallel test containers can attach and run without rebuilding.
    - persist_to_workspace:
        root: .
        paths:
        - ./tmp/behat-db-export
        - .

  # Behat functional tests — RUN phase (parallelized).
  #
  # Attaches the built tree + DB dump from behat_setup, imports the dump into
  # its own MariaDB service container, then runs its shard of the Behat suite.
  # Self-skips when the project ships no tests/behat directory.
  behat_test:
    executor: behat
    resource_class: medium
    parallelism: 12
    steps:
    # Pull the built tree + DB dump from behat_setup into the working dir.
    - attach_workspace:
        at: .
    # [gate] Skip unless the project ships Behat tests.
    - run:
        name: Skip if project has no tests/behat
        command: |
          if [ ! -d tests/behat ]; then
            echo "No tests/behat directory in this project — skipping Behat."
            circleci-agent step halt
          fi
    - run:
        name: Start XVFB
        command: |
          export DISPLAY=:99.0
          Xvfb :99 -screen 0 1280x1024x16 &
    - run:
        name: Setting PHP vars
        command: |
          echo 'memory_limit = -1' | sudo tee -a /usr/local/etc/php/conf.d/docker-php-memlimit.ini
          echo 'memory_limit = -1' | sudo tee -a /usr/local/etc/php/conf.d/memory.ini
          echo "display_errors = On" | sudo tee /usr/local/etc/php/conf.d/display_errors.ini
          echo "display_startup_errors = On" | sudo tee -a /usr/local/etc/php/conf.d/display_errors.ini
          echo "error_reporting = E_ALL" | sudo tee -a /usr/local/etc/php/conf.d/display_errors.ini
    - run:
        name: Configuring Drupal
        command: ./.ci/test/behat/configure-site
    - run:
        name: Create DB and import pre-installed database
        command: |
          dockerize -wait tcp://localhost:3306 -timeout 4m
          mysql -h 127.0.0.1 -P 3306 -u root -proot -e "CREATE DATABASE circle_test;"
          if [ -f ./tmp/behat-db-export/drupal-installed.sql.gz ]; then
            echo "Importing pre-installed database (much faster than fresh install)..."
            gunzip -c ./tmp/behat-db-export/drupal-installed.sql.gz | mysql -h 127.0.0.1 -P 3306 -u root -proot circle_test
            echo "Database imported successfully"
            # Clear cache after import
            ./vendor/bin/drush cr
          else
            echo "WARNING: Pre-installed database not found, falling back to fresh install"
            ./.ci/test/behat/install-drupal
          fi
    - run:
        name: Disable Hubspot module
        command: ./vendor/bin/drush pm:uninstall hubspot -y || echo "Hubspot not enabled"
    - run:
        name: Clear Drupal Cache
        command: ./vendor/bin/drush cr
    - run:
        name: Create artifact dir
        command: cd /var/www/project && mkdir -p ./tests/behat/results && mkdir -p ./tests/behat/results/junit

    - run:
        name: Globbing Behat tests
        command: |
          echo $(circleci tests glob "tests/behat/features/*")
          circleci tests glob "tests/behat/features/*" | xargs -n 1 echo
    - run:
        name: Setup Apache
        command: |
          [ -f /var/run/apache2/apache2.pid ] && sudo rm /var/run/apache2/apache2.pid
          [ -f /var/lock/apache2/apache2.pid ] && sudo rm /var/lock/apache2/apache2.pid
          sudo service apache2 start
          echo 127.0.0.1 drupal-circleci-behat.localhost | sudo tee -a /etc/hosts
          sudo service apache2 restart
    - run:
        name: Trigger page load to initialize H5P libraries
        command: |
          # Wait for Apache to be fully ready
          sleep 2
          # Make a request to the homepage to trigger Drupal bootstrap and H5P library initialization
          curl -s -o /dev/null -w "%{http_code}" http://drupal-circleci-behat.localhost/ || echo "Page load triggered (exit code $?)"
    - run:
        name: Split and run Behat tests
        command: |
          ./.ci/test/behat/chrome.sh
          ./.ci/test/behat/run-tests-circle
    - store_artifacts:
        path: ./tests/behat/results
        destination: artifacts
    - store_test_results:
        path: ./tests/behat/results
    - store_artifacts:
        path: /tmp/chrome.log
        destination: artifact-files
    - store_artifacts:
        path: /tmp/test_messages.log
        destination: behat-test-logs
    - run:
        name: Enable Hubspot module
        command: ./vendor/bin/drush pm-enable hubspot -y || echo "Hubspot not present"
    # [notify] Notify Slack on failure
    - slack/notify:
        event: fail
        channel: C06G970M5PF
        template: basic_fail_1

  # Compiles the theme on a Node image and stages the assets for the Behat jobs,
  # WITHOUT depending on build_and_deploy. Used by the master flow, where Behat
  # runs before the deploy and so can't inherit the deploy's theme build — and
  # the Behat testing image may not ship npm. Stages into the exact workspace
  # layout behat_setup's restore step expects (theme-build/<rel> + theme-path.txt).
  # Self-skips when the project ships no tests/behat.
  build_assets:
    docker:
    - image: cimg/node:20.11
    working_directory: ~/project
    steps:
    - checkout
    - run:
        name: Skip if project has no tests/behat
        command: |
          if [ ! -d tests/behat ]; then
            echo "No tests/behat — nothing to build for Behat."
            circleci-agent step halt
          fi
    - run:
        name: Build theme and stage assets for Behat
        command: |
          set -eo pipefail
          # Always create the targets so persist_to_workspace never errors.
          mkdir -p /tmp/workspace/theme-build
          : > /tmp/workspace/theme-path.txt
          # Resolve THEME_PATH/THEME_INSTALL/THEME_BUILD from the project's
          # env_vars.sh and/or CircleCI project env, then normalize the web root.
          [ -f ./.circleci/env_vars.sh ] && source ./.circleci/env_vars.sh || true
          [ -f ./.ci/scripts/detect_web_root.sh ] && source ./.ci/scripts/detect_web_root.sh || true
          if [ -z "${THEME_PATH:-}" ] || [ ! -d "${THEME_PATH}" ]; then
            echo "No usable THEME_PATH — skipping theme build (Behat may be unstyled)."
            exit 0
          fi
          echo "Building theme at ${THEME_PATH}"
          # Non-fatal: the authoritative theme validation/gating lives in
          # build_and_deploy. Stage whatever the build produces either way.
          ( cd "${THEME_PATH}" \
              && bash -c "${THEME_INSTALL:-npm ci}" \
              && bash -c "${THEME_BUILD:-npm run build}" ) \
            || echo "Theme build failed — staging whatever exists (Behat may be unstyled)."
          THEME_REL="${THEME_PATH#./}"
          printf '%s\n' "${THEME_REL}" > /tmp/workspace/theme-path.txt
          mkdir -p "/tmp/workspace/theme-build/${THEME_REL}"
          tar -C "${THEME_PATH}" --exclude=node_modules -cf - . \
            | tar -C "/tmp/workspace/theme-build/${THEME_REL}" -xf -
          echo "Staged compiled theme assets for Behat: ${THEME_REL}"
    - persist_to_workspace:
        root: /tmp/workspace
        paths:
        - theme-build/
        - theme-path.txt

# [workflows] Two orderings selected by branch:
#
#   • pr_build_test (all branches EXCEPT master): feature-branch / PR flow.
#     Deploy to the multidev FIRST, then run tests against the live preview.
#     Tests do not block the multidev deploy.
#
#   • master_test_then_deploy (master only → Pantheon dev): Behat runs FIRST and
#     BLOCKS the deploy — master only deploys to dev if Behat passes. Playwright
#     runs AFTER the deploy as a non-blocking check (nothing depends on it).
#
# The jobs are defined once under `jobs:` and reused in both workflows with
# different `requires` + branch filters. Branch filters ensure only the matching
# workflow's jobs actually run for a given branch.
workflows:
  # Feature-branch / PR flow: deploy to the multidev, then test it.
  pr_build_test:
    jobs:
    - check_multidev_capacity:
        filters:
          branches:
            ignore: master
        context:
        - GITHUB_TOKEN
        - JIRA_API_TOKEN
        - JIRA_WEBHOOK
    - build_and_deploy:
        filters:
          branches:
            ignore: master
        requires:
        - check_multidev_capacity
        context:
        - GITHUB_TOKEN
    - playwright_visual_tests:
        filters:
          branches:
            ignore: master
        requires:
        - build_and_deploy
        context:
        - SLACK_ACCESS_TOKEN
        - JIRA_WEBHOOK_URL
        # Carries both VRT_USERNAME and VRT_PASSWORD for authenticated routes.
        - VRT_USERNAME
    - behat_setup:
        filters:
          branches:
            ignore: master
        requires:
        - build_and_deploy
        context:
        - GITHUB_TOKEN
        - SLACK_ACCESS_TOKEN
    - behat_test:
        filters:
          branches:
            ignore: master
        requires:
        - behat_setup
        context:
        - GITHUB_TOKEN
        - SLACK_ACCESS_TOKEN

  # master flow: Behat gates the deploy to Pantheon dev.
  master_test_then_deploy:
    jobs:
    # Build the theme first so Behat renders a styled site (the deploy job that
    # would normally supply assets runs AFTER Behat here). No multidev capacity
    # check needed — master deploys to the existing dev env, not a multidev.
    - build_assets:
        filters:
          branches:
            only: master
    - behat_setup:
        filters:
          branches:
            only: master
        requires:
        - build_assets
        context:
        - GITHUB_TOKEN
        - SLACK_ACCESS_TOKEN
    - behat_test:
        filters:
          branches:
            only: master
        requires:
        - behat_setup
        context:
        - GITHUB_TOKEN
        - SLACK_ACCESS_TOKEN
    # Deploy to dev ONLY after Behat passes.
    - build_and_deploy:
        filters:
          branches:
            only: master
        requires:
        - behat_test
        context:
        - GITHUB_TOKEN
    # Non-blocking VRT after the dev deploy. NOTE: VRT compares DEV vs MULTIDEV;
    # on master there's no multidev, so treat results as informational.
    - playwright_visual_tests:
        filters:
          branches:
            only: master
        requires:
        - build_and_deploy
        context:
        - SLACK_ACCESS_TOKEN
        - JIRA_WEBHOOK_URL
        - VRT_USERNAME
