version: 2.1

orbs:
  jira: circleci/jira@2.2.0
  gh: circleci/github-cli@2.7.0
  slack: circleci/slack@5.1.1

executors:
  pantheon:
    docker:
    - image: quay.io/pantheon-public/build-tools-ci:8.x-php8.3
    working_directory: ~/project

  playwright:
    docker:
    - image: mcr.microsoft.com/playwright:v1.52.0-noble
    working_directory: ~/project

defaults: &defaults
  executor: pantheon
  working_directory: ~/project
  environment:
    TZ: "/usr/share/zoneinfo/America/Los_Angeles"
    NOTIFY: 'scripts/github/add-commit-comment {project} {sha} "Created multidev environment [{site}#{env}]({site-url}). Login with creds: username: admin, password: wh0C4r3s?" {site-url}'
    ADMIN_USERNAME: admin

jobs:
  # Main build and deploy job
  build_and_deploy:
    <<: *defaults
    resource_class: small
    steps:
    # [setup] Checkout code and set up Docker
    - checkout
    - setup_remote_docker:
        docker_layer_caching: true
    # [vars][wet] Calculate environment URLs and variables
    - run:
        name: Setup environment and calculate URLs
        command: |
          # Run Pantheon environment setup
          /build-tools-ci/scripts/set-environment

          # Source the script to preserve environment variables
          source ./.ci/scripts/setup_vars.sh

          # Verify the variables were set correctly
          echo "Verification: Using TERMINUS_ENV: $TERMINUS_ENV"
          echo "Verification: Using MULTIDEV_SITE_URL: $MULTIDEV_SITE_URL"
          echo "Verification: Using DEV_SITE_URL: $DEV_SITE_URL"

          # Create the workspace directory if it doesn't exist
          mkdir -p /tmp/workspace

          # Write all variables to a single file for workspace and subsequent steps
          {
            # CircleCI variables
            echo "export CI_BUILD_URL='${CIRCLE_BUILD_URL}'"
            echo "export CI_NODE_INDEX='${CIRCLE_NODE_INDEX}'"
            echo "export CI_REPOSITORY_URL='${CIRCLE_REPOSITORY_URL}'"
            echo "export ARTIFACTS_DIR_URL='${CIRCLE_BUILD_URL}/artifacts/${CIRCLE_NODE_INDEX}/artifacts'"

            # Pantheon and site variables
            echo "export TERMINUS_SITE='$TERMINUS_SITE'"
            echo "export TERMINUS_ENV='$TERMINUS_ENV'"
            echo "export JIRA_TICKET_ID='$JIRA_TICKET_ID'"
            echo "export MULTIDEV_SITE_URL='$MULTIDEV_SITE_URL'"
            echo "export DEV_SITE_URL='$DEV_SITE_URL'"

            # Web-root + corrected theme path (computed by setup_vars.sh).
            # Exporting both means every later step (Load env, Verify,
            # Install, Build, Pantheon push, visual-regression job, etc.)
            # gets the same canonical values without re-detecting.
            echo "export WEB_ROOT='$WEB_ROOT'"
            echo "export THEME_PATH='$THEME_PATH'"
          } > /tmp/workspace/env_vars.sh

          # Also add to BASH_ENV for current job steps
          cat /tmp/workspace/env_vars.sh >> $BASH_ENV
          source $BASH_ENV

          echo "Saved environment variables to workspace:"
          cat /tmp/workspace/env_vars.sh
    # [build] Handle Composer dependencies
    - run:
        name: Clear Composer Cache
        command: |
          if [ -f "composer.json" ]; then
            composer clear-cache
          fi
    - run:
        name: Installing composer dependencies
        command: |
          if [ -f "composer.json" ]; then
            composer install --no-ansi --no-interaction --optimize-autoloader --no-progress
          else
            echo "No composer.json found, skipping composer install."
          fi
    # [cache] Save Composer cache
    - save_cache:
        key: composer-cache-v1-{{ checksum "composer.lock" }}
        paths:
        - $HOME/.composer/cache

    # Load environment variables from external file
    - run:
        name: Load environment variables
        command: |
          # Make the env vars script executable
          chmod +x ./.circleci/env_vars.sh
          # Source it into BASH_ENV for all steps
          echo 'source ./.circleci/env_vars.sh' >> $BASH_ENV
          # Re-run web-root detection AFTER env_vars.sh on every step. The
          # project's env_vars.sh may unconditionally `export THEME_PATH=...`
          # which would otherwise overwrite the corrected value from
          # setup_vars.sh. detect_web_root.sh is idempotent.
          echo 'source ./.ci/scripts/detect_web_root.sh' >> $BASH_ENV
          source $BASH_ENV

    # Verify required environment variables are set.
    # THEME_PATH normalization runs automatically via $BASH_ENV (see
    # setup_vars.sh + detect_web_root.sh); this step only sanity-checks the
    # final values and hard-fails before we try to `cd` into something
    # that doesn't exist.
    - run:
        name: Verify required theme variables are set
        command: |
          echo "WEB_ROOT=${WEB_ROOT:-<unset>}"
          echo "THEME_PATH=${THEME_PATH:-<unset>}"

          if [ -z "${THEME_PATH:-}" ]; then
            echo "ERROR: THEME_PATH environment variable is not set!"
            echo "Please set THEME_PATH in the CircleCI project settings or in .circleci/env_vars.sh"
            exit 1
          fi

          if [ ! -d "${THEME_PATH}" ]; then
            echo "ERROR: THEME_PATH does not exist on disk: ${THEME_PATH}"
            echo "Detected WEB_ROOT: ${WEB_ROOT:-<none>}"
            echo "Project layout (top-level):"
            ls -1 | sed 's/^/  /'
            exit 1
          fi

          if [ -z "${THEME_BUILD}" ]; then
            echo "ERROR: THEME_BUILD environment variable is not set!"
            echo "Please set THEME_BUILD in the CircleCI project settings or in .circleci/env_vars.sh"
            exit 1
          fi

          # Catch the common copy-paste bug where THEME_BUILD is set to
          # `npm install` (or duplicates THEME_INSTALL). The build "succeeds"
          # but produces no compiled assets, and the deploy ships an unstyled
          # site. Fail loudly here so the misconfiguration is obvious.
          if [ "${THEME_BUILD}" = "${THEME_INSTALL}" ] || \
             printf '%s' "${THEME_BUILD}" | grep -qE '^[[:space:]]*npm[[:space:]]+install([[:space:]]|$)'; then
            echo "ERROR: THEME_BUILD looks wrong — it's '${THEME_BUILD}'."
            echo "  THEME_BUILD should compile the theme (e.g. 'npm run build', 'gulp build')."
            echo "  THEME_INSTALL is what installs dependencies (e.g. 'npm install')."
            echo "  Fix THEME_BUILD in .circleci/env_vars.sh."
            exit 1
          fi

          # Validate every `npm run <script>` referenced anywhere in
          # THEME_BUILD actually exists in the theme's package.json. Catches
          # typos AND missing scripts in chained commands like
          # `npm ci && npm run build`. Scans the whole string, not just the
          # leading command, so a typo at the end still fails the build.
          if [ -f "${THEME_PATH}/package.json" ]; then
            npm_scripts="$(printf '%s' "${THEME_BUILD}" | grep -oE 'npm[[:space:]]+run[[:space:]]+[A-Za-z0-9_:.-]+' | awk '{print $NF}' | sort -u || true)"
            for s in ${npm_scripts}; do
              if ! grep -qE "\"${s}\"[[:space:]]*:" "${THEME_PATH}/package.json"; then
                echo "ERROR: THEME_BUILD references 'npm run ${s}' but no '${s}' script is defined in ${THEME_PATH}/package.json"
                echo "Available scripts:"
                grep -E '^\s+"[^"]+"\s*:\s*".*"' "${THEME_PATH}/package.json" | sed 's/^/  /' || true
                exit 1
              fi
            done
          fi

          echo "Required theme variables verified: THEME_PATH=${THEME_PATH}, THEME_INSTALL=${THEME_INSTALL}, THEME_BUILD=${THEME_BUILD}"

    # Use npm ci instead of npm install if you want to install dependencies
    # according to the exact versions in package-lock.json.
    # NOTE: THEME_INSTALL/THEME_BUILD are invoked via `bash -c` so shell
    # operators inside the value (e.g. `npm ci && npm run build`) are
    # parsed as operators, not passed as literal args. With bare
    # `${THEME_INSTALL}` expansion they'd word-split and npm would silently
    # receive `&&` as a positional argument and skip everything after it.
    - run:
        name: Installing NPM dependencies in theme
        command: |
          cd "${THEME_PATH}"
          bash -c "${THEME_INSTALL}"

    # Your existing steps for building assets
    - run:
        name: Compiling SCSS to CSS, minifying JS
        command: |
          cd "${THEME_PATH}"
          bash -c "${THEME_BUILD}"

    # Diagnostic: prove the build produced files before we try to ship them.
    # If styles ever go missing from a deploy, this output is the first
    # place to look — empty/missing artifacts here mean the build dropped
    # them; full output here but missing on prod means the deploy step
    # excluded them (see `git status` diagnostics below).
    - run:
        name: Theme build sanity check (post-build artifacts)
        command: |
          echo "Top-level contents of ${THEME_PATH}:"
          ls -la "${THEME_PATH}" | sed 's/^/  /'
          # Buffer find results to a file + truncate via awk to avoid
          # SIGPIPE/141 with high-volume output under `set -eo pipefail`.
          for d in dist build assets css js public; do
            if [ -d "${THEME_PATH}/${d}" ]; then
              echo
              echo "${THEME_PATH}/${d} ($(du -sh "${THEME_PATH}/${d}" | cut -f1)):"
              FIND_TMP="$(mktemp)"
              find "${THEME_PATH}/${d}" -maxdepth 3 -type f \( -name '*.css' -o -name '*.js' -o -name '*.map' \) > "${FIND_TMP}" 2>/dev/null || true
              awk 'NR<=40 {print "  " $0} END {if (NR>40) print "  ... (" NR-40 " more)"}' "${FIND_TMP}"
              rm -f "${FIND_TMP}"
            fi
          done

    # NOTE: don't hardcode a web-root path (e.g. web/themes/) here — projects
    # vary (web/ vs html/, per composer drupal-scaffold web-root). Built theme
    # assets are deployed to Pantheon via build:env:push, and the visual-
    # regression job tests the live multidev URL, so it doesn't need the theme
    # source in the workspace. Persist only what later jobs actually consume.
    - persist_to_workspace:
        root: .
        paths:
        - test_routes.json
    - run:
        name: Remove .gitignore files from theme directories
        command: |
          # Find and remove all .gitignore files in theme subdirectories
          if [ -n "${THEME_PATH}" ] && [ -d "${THEME_PATH}" ]; then
            echo "Removing .gitignore files from theme directory: ${THEME_PATH}"
            find ${THEME_PATH} -type f -name ".gitignore" -exec rm -f {} \;
            echo "Removed all .gitignore files from theme directories"
          else
            echo "Theme path not found or not defined. Skipping .gitignore removal."
          fi
    - run:
        name: Capture PR-changed config (before build rewrites git)
        environment:
          CONFIG_BASE_BRANCH: main
          CONFIG_SYNC_DIR: config/sync
          PR_CHANGED_FILE: /tmp/pr-changed-config.txt
          PR_BASE_DIR: /tmp/pr-base-config
        command: |
          # Snapshot which config/sync files the PR changed while the
          # checkout is still pristine. The later "Sync Drupal config from
          # prod" step reads this list — by then build:env:push has rewritten
          # git, so the diff can't be recomputed reliably.
          chmod +x ./.ci/scripts/config_split/capture-pr-config-changes.sh
          ./.ci/scripts/config_split/capture-pr-config-changes.sh
    - run:
        name: Preparing code for Pantheon
        command: |
          # Cutting root .gitignore so composer dependencies can be committed
          sed -i '1,/^# :::::::::::::::::::::: cut ::::::::::::::::::::::$/d' .gitignore

          # Diagnostic: surface any .gitignore rules that would still exclude
          # built theme assets. If files under THEME_PATH are listed here,
          # they WILL be missing from the Pantheon push — fix the matching
          # ignore rule (typically a `dist/`, `build/`, or `assets/` pattern
          # in a parent .gitignore that our theme-dir cleanup didn't touch).
          # Buffer to a file (no pipes!) so SIGPIPE from `head` can't kill
          # the build under `set -eo pipefail`.
          if [ -n "${THEME_PATH:-}" ] && [ -d "${THEME_PATH}" ]; then
            echo "Checking for .gitignore exclusions under ${THEME_PATH}..."
            IGNORED_TMP="$(mktemp)"
            git ls-files --others --ignored --exclude-standard "${THEME_PATH}" > "${IGNORED_TMP}" 2>/dev/null || true
            if [ -s "${IGNORED_TMP}" ]; then
              echo "⚠️  These built theme files are still .gitignore'd and WILL NOT deploy:"
              awk 'NR<=40 {print "    " $0} END {if (NR>40) print "    ... (" NR-40 " more)"}' "${IGNORED_TMP}"
              echo "    (Look for a parent-directory .gitignore with dist/, build/, or assets/ rules.)"
            else
              echo "  No .gitignore'd files under ${THEME_PATH}."
            fi
            rm -f "${IGNORED_TMP}"
          fi

          git add -A

          # Diagnostic: show what's about to be deployed so missing files
          # are obvious in the CI log without having to ssh to Pantheon.
          # Buffer to a file + truncate via awk (NOT `head`) to avoid the
          # SIGPIPE/141 trap with high-volume output under `pipefail`.
          STATUS_TMP="$(mktemp)"
          git status --short > "${STATUS_TMP}" 2>/dev/null || true
          STATUS_COUNT=$(wc -l < "${STATUS_TMP}" | tr -d ' ')
          echo "Files staged for deploy commit (${STATUS_COUNT} total, showing up to 80):"
          awk 'NR<=80 {print "  " $0} END {if (NR>80) print "  ... (" NR-80 " more)"}' "${STATUS_TMP}"
          rm -f "${STATUS_TMP}"

          git commit -m "Preparing code for deployment" || true
    - run:
        name: Deploying to Pantheon
        command: ./.ci/scripts/dev-multidev.sh
        no_output_timeout: 40m
    - run:
        name: Sync Drupal config from prod (preserving PR-modified files)
        no_output_timeout: 40m
        environment:
          CONFIG_BASE_BRANCH: main
          CONFIG_SYNC_DIR: config/sync
          CONFIG_SYNC_REPORT: /tmp/config-sync-report.md
          PR_CHANGED_FILE: /tmp/pr-changed-config.txt
          PR_BASE_DIR: /tmp/pr-base-config
        command: |
          chmod +x ./.ci/scripts/config_split/sync-prod-config.sh
          ./.ci/scripts/config_split/sync-prod-config.sh
    - run:
        name: Post config-sync report to PR (mirrored to Jira)
        when: always
        environment:
          CONFIG_SYNC_REPORT: /tmp/config-sync-report.md
        command: |
          chmod +x ./.ci/scripts/config_split/post_config_sync_comment.sh
          ./.ci/scripts/config_split/post_config_sync_comment.sh
    - run:
        name: Post config-sync report directly to Jira
        when: always
        environment:
          CONFIG_SYNC_REPORT: /tmp/config-sync-report.md
        command: |
          # Posts to Jira REST API directly so prod config drift lands on
          # the ticket even when no PR is associated, or when the
          # GitHub→Jira mirror workflow isn't installed. Requires
          # JIRA_BASE_URL / JIRA_USER / JIRA_TOKEN in a CircleCI context;
          # the script no-ops cleanly if any are missing.
          chmod +x ./.ci/scripts/config_split/post_config_sync_jira_comment.sh
          ./.ci/scripts/config_split/post_config_sync_jira_comment.sh
    - run:
        name: Post Multidev URL to GitHub PR
        command: ./.ci/scripts/post_multidev_url.sh

    # Save environment variables and Git data for the test job
    - run:
        name: Prepare workspace
        command: |
          mkdir -p /tmp/workspace

          # Copy the entire working directory to the workspace
          # This includes the .git directory which is needed for Jira integration
          echo "Copying files to workspace..."
          cp -a . /tmp/workspace/

          # Make sure the .git directory exists
          if [ -d "/tmp/workspace/.git" ]; then
            echo "Git repository found in workspace"
            # Ensure Git is properly configured in the workspace
            cd /tmp/workspace
            git config --global --add safe.directory /tmp/workspace
            git config --global user.email "circleci@example.com"
            git config --global user.name "CircleCI"
          else
            echo "Warning: .git directory not found in workspace"
          fi

          # Save environment variables
          {
            echo "export TERMINUS_SITE='${TERMINUS_SITE}'"
            echo "export TERMINUS_ENV='${TERMINUS_ENV}'"
            echo "export MULTIDEV_SITE_URL='${MULTIDEV_SITE_URL}'"
            echo "export DEV_SITE_URL='${DEV_SITE_URL}'"
          } > /tmp/workspace/env_vars.sh

          # Debug: Show what we're saving
          echo "=== Workspace Contents ==="
          ls -la /tmp/workspace
          echo "\n=== Saved Environment Variables ==="
          cat /tmp/workspace/env_vars.sh
          echo "=================================="

    - persist_to_workspace:
        root: /tmp/workspace
        paths:
        - env_vars.sh
        - .ci/
        - .circleci/
        - .git/
        - test_routes.json

  # Playwright visual regression testing job
  playwright_visual_tests:
    executor: playwright
    resource_class: medium
    working_directory: /tmp/workspace
    environment:
      ARTIFACTS_FULL_DIR: /tmp/workspace/artifacts
    steps:
    # [persist][vars] Attach workspace to load saved environment variables and code
    - attach_workspace:
        at: /tmp/workspace
    # [setup] Set up Docker for running visual tests
    - setup_remote_docker:
        docker_layer_caching: true
    # [setup][notify] Install jq for Jira notifications
    - run:
        name: Install jq
        command: apt-get update && apt-get install -y jq
    # [vars] Load environment variables from the workspace
    - run:
        name: Load environment variables
        command: |
          # Source the environment variables file
          if [ -f /tmp/workspace/env_vars.sh ]; then
            echo "Loading environment variables from workspace..."
            source /tmp/workspace/env_vars.sh
            # Add to BASH_ENV for subsequent steps
            cat /tmp/workspace/env_vars.sh >> $BASH_ENV
            source $BASH_ENV

            # Debug: Show key environment variables
            echo "DEV_SITE_URL: $DEV_SITE_URL"
            echo "MULTIDEV_SITE_URL: $MULTIDEV_SITE_URL"
          else
            echo "Warning: Environment variables file not found"
          fi

    # [guard] Wait for the multidev to wake before hitting it. Pantheon
    # appservers cold-start in 30–60s; without this the first screenshots
    # race the spin-up and flake. Runs first so the wait is explicit.
    - run:
        name: Check multidev is ready
        command: |
          chmod +x ./.ci/scripts/check-multidev.sh
          ./.ci/scripts/check-multidev.sh

    # [test] Run visual regression tests with Playwright
    - run:
        name: Run Playwright visual regression tests
        command: |
          echo "Current directory: $(pwd)"
          echo "Listing contents of /tmp/workspace/.ci/test/visual-regression:"
          ls -la /tmp/workspace/.ci/test/visual-regression
          cd /tmp/workspace/.ci/test/visual-regression
          echo "Installing npm dependencies..."
          # Use npm ci for cleaner and faster installs in CI
          npm ci
          echo "Installing Playwright browsers..."
          # The base image should have system dependencies, so playwright install should suffice
          # If issues persist, can switch to 'npx playwright install --with-deps'
          npx playwright install
          echo "Running Playwright tests..."
          chmod +x ./run-playwright
          ./run-playwright

    # [artifacts] Store screenshots with visual comparison reports
    - store_artifacts:
        path: /tmp/workspace/.ci/test/visual-regression/playwright-report

    # [artifacts] Store JUnit test results
    - store_test_results:
        path: /tmp/workspace/.ci/test/visual-regression/test-results

    # [notify] Notify Slack on failure
    - slack/notify:
        event: fail
        channel: C06G970M5PF
        template: basic_fail_1
    # [notify][jira] Send notification to Jira
    - jira/notify:
        environment: testing
        job_type: deployment
        debug: true
        pipeline_id: << pipeline.id >>
        pipeline_number: << pipeline.number >>
  # Behat functional tests job.
  #
  # This job ALWAYS exists in the pipeline, but self-skips via
  # `circleci-agent step halt` when the project ships no tests/behat
  # directory — so the tool adapts automatically without re-running
  # composer when a project adds or removes Behat coverage. The skip
  # gate runs before the multidev wait so we never burn the ~5-minute
  # readiness budget on a project that has no tests to run.
  behat_test:
    <<: *defaults
    resource_class: small
    steps:
    - checkout
    # [persist][vars] Pull the deploy env (multidev URL etc.) from the build job.
    - attach_workspace:
        at: /tmp/workspace
    # [gate] Skip the whole job unless the project ships Behat tests.
    - run:
        name: Skip if project has no tests/behat
        command: |
          if [ ! -d tests/behat ]; then
            echo "No tests/behat directory in this project — skipping Behat."
            circleci-agent step halt
          fi
    # [vars] Load saved environment variables (MULTIDEV_SITE_URL, etc.).
    - run:
        name: Load environment variables
        command: |
          if [ -f /tmp/workspace/env_vars.sh ]; then
            echo "Loading environment variables from workspace..."
            cat /tmp/workspace/env_vars.sh >> $BASH_ENV
            source $BASH_ENV
            echo "MULTIDEV_SITE_URL: $MULTIDEV_SITE_URL"
          else
            echo "Warning: Environment variables file not found"
          fi
    # [guard] Make sure the multidev is serving before we test it.
    - run:
        name: Check multidev is ready
        command: |
          chmod +x ./.ci/scripts/check-multidev.sh
          ./.ci/scripts/check-multidev.sh
    # [build] Restore composer cache from the build job and install dev deps
    # (behat lives in require-dev).
    - restore_cache:
        keys:
        - composer-cache-v1-{{ checksum "composer.lock" }}
    - run:
        name: Installing composer dependencies
        command: |
          if [ -f "composer.json" ]; then
            composer install --no-ansi --no-interaction --optimize-autoloader --no-progress
          else
            echo "No composer.json found, skipping composer install."
          fi
    # [test] Run Behat against the live multidev.
    - run:
        name: Run Behat functional tests
        command: |
          chmod +x ./.ci/test/functional/run-behat
          ./.ci/test/functional/run-behat
    # [notify] Notify Slack on failure
    - slack/notify:
        event: fail
        channel: C06G970M5PF
        template: basic_fail_1

# [workflow] Main build, test, and notification workflow
workflows:
  build_test_notify:
    jobs:
    # [job] Primary build and deployment job
    - build_and_deploy:
        context:
        - GITHUB_TOKEN
    # [job] Playwright visual regression tests
    - playwright_visual_tests:
        requires:
        - build_and_deploy
        # [context] Shared secrets and environment variables
        context:
        - SLACK_ACCESS_TOKEN
        - JIRA_WEBHOOK_URL
        # VRT login credentials for authenticated routes (auth:true in
        # test_routes.json). Read at runtime as VRT_USERNAME / VRT_PASSWORD.
        - VRT_USERNAME
    # [job] Behat functional tests (self-skips when no tests/behat present)
    - behat_test:
        requires:
        - build_and_deploy
        context:
        - GITHUB_TOKEN
        - SLACK_ACCESS_TOKEN
