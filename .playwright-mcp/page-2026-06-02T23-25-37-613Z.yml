          - generic [ref=e795]:
            - heading "Product Description" [level=2] [ref=e796]
            - paragraph [ref=e797]:
              - text: Igor Pro 10 is an interactive software environment for experimentation with scientific and engineering data and for the production of publication-quality graphs and page layouts. Igor
              - link "has been used by tens of thousands of technical professionals" [ref=e798] [cursor=pointer]:
                - /url: https://scholar.google.com/scholar?hl=en&as_sdt=0%2C38&q=WaveMetrics+%22Igor+Pro%22&btnG=
              - text: since its introduction in 1989.
            - paragraph [ref=e799]: Igor Pro combines powerful tools with an easy to use, point and click interface for the casual user together and a programming environment for the sophisticated user. Igor Pro’s plugin technology extends the built-in functionality with custom tools for data acquisition, instrument control and computational tasks.
            - paragraph [ref=e800]:
              - text: The latest Igor Pro 10 release contains hundreds of improvements, including Python integration, built-in support for HDF5, new functions and operations. View the full list of updates
              - link "here" [ref=e801] [cursor=pointer]:
                - /url: /products/igorpro/newfeatures10
              - text: .
            - heading "Free Upgrade Eligibility" [level=4] [ref=e802]
            - paragraph [ref=e803]:
              - emphasis [ref=e804]:
                - strong [ref=e805]: All Igor Pro 9 licenses (new and upgrades) sold on or after January 1, 2025, are eligible for a free upgrade to Igor Pro 10.
            - heading "System Requirements" [level=4] [ref=e806]
            - paragraph [ref=e807]:
              - text: Igor Pro runs on Windows 10 or later. See our
              - link "Platform Support page" [ref=e808] [cursor=pointer]:
                - /url: /products/igorpro/platformsupport
              - text: for version specific details.
            - heading "Igor Pro is an excellent tool for:" [level=3] [ref=e809]
            - list [ref=e810]:
              - listitem [ref=e811]:
                - strong [ref=e812]: Graphics Creation -
                - text: Igor Pro is first and foremost a publication quality scientific and engineering graphics program, capable of creating visually stunning 3D graphics as well as 2D graphs.
              - listitem [ref=e813]:
                - strong [ref=e814]: Data Access -
                - text: Scientists and engineers encounter many data formats. Igor Pro provides a variety of import, storage and export capabilities that can handle almost any requirement.
              - listitem [ref=e815]:
                - strong [ref=e816]: Data Storage -
                - text: Unlike spreadsheet programs, Igor Pro's data objects won't clutter up your screen. Efficiently organize your data into a hierarchy, just like you would organize files in a hierarchy of folders on your hard drive!
              - listitem [ref=e817]:
                - strong [ref=e818]: Data Manipulation & Math -
                - text: Igor Pro provides an extensive library of math and data manipulation routines and Igor's array-oriented arithmetic make complex operations a snap.
              - listitem [ref=e819]:
                - strong [ref=e820]: Image Processing -
                - text: Igor Pro contains a full set of operations and functions for scientific image analysis applications.
              - listitem [ref=e821]:
                - strong [ref=e822]: Data Analysis -
                - text: Igor provides many analysis capabilities, including curve fitting, peak analysis, signal processing and statistics.
              - listitem [ref=e823]:
                - strong [ref=e824]: Analysis of Function -
                - text: "Igor includes several operations that work on functions rather than discrete data points, including: plotting of functions, differential equations, numerical integration of functions, root finding and optimization."
            - heading "Programming" [level=3] [ref=e825]
            - paragraph [ref=e826]: Igor Pro includes a powerful and full-featured structured programming language that you can use for automation of data import, file I/O, analysis, data acquisition, graphing, drawing, printing, and just about anything you can think of.
            - paragraph [ref=e827]: Igor Pro´s full-featured symbolic debugger gives you a powerful tool to get your code working properly by observing it execute one step at a time. You can view multidimensional waves as images and 1D waves in a regular graph. You can also view waves in a table and values edited in place.
            - paragraph [ref=e828]:
              - text: Igor Pro
              - superscript [ref=e829]: ®
              - text: 10 introduces built-in Python integration, allowing you to directly execute Python code and exchange data between Igor and Python. Together, users can combine the power of Igor's numeric analysis, data visualization, and data management tools with the extensive set of third-party libraries that are available to Python programmers.
            - heading "Igor Pro Brochure" [level=3] [ref=e830]
            - paragraph [ref=e831]:
              - link "Download" [ref=e832] [cursor=pointer]:
                - /url: https://www.wavemetrics.net/Downloads/Igor10BrochureEnglish.pdf
              - text: our full-color two page brochure for Igor Pro 10.
